name: Build and Release Executables

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            artifact_name: kontrola_tymu_macos
            output_file: kontrola_tymu
          - os: windows-latest
            artifact_name: kontrola_tymu_windows
            output_file: kontrola_tymu.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Prepare
        uses: actions/checkout@v4

      - name: Clang, cURL and pkg-config
        if: runner.os == 'Windows'
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-x86_64-curl mingw-w64-x86_64-pkgconf mingw-w64-x86_64-clang
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Scala CLI
        uses: VirtusLab/scala-cli-setup@main

      - name: Use system curl for portable binary (macOS)
        if: runner.os == 'macOS'
        run: |
          # Unlink Homebrew curl/libidn2 so the linker finds only the macOS system curl,
          # which has no external dependencies. This makes the binary portable to any Mac.
          brew unlink curl 2>/dev/null || true
          brew unlink libidn2 2>/dev/null || true

      - name: Build
        run: scala-cli --power package kontrola_tymu.scala --native --native-mode release-full -f -o ${{ matrix.output_file }}

      - name: Zabaleni do ZIPu (macOS)
        if: runner.os == 'macOS'
        run: zip kontrola_tymu_macos.zip ${{ matrix.output_file }}

      - name: Zabaleni do ZIPu (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path ${{ matrix.output_file }} -DestinationPath kontrola_tymu_windows.zip

      - name: Nahrani do docasneho artefaktu
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: '*.zip'
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Důležité: Povoluje vytvoření veřejného vydání
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update release
        uses: ncipollo/release-action@v1
        with:
          tag: "latest"
          name: "Aktuální verze"
          body: "Automaticky zkompilovaná verze z nejnovějšího zdrojového kódu."
          artifacts: "artifacts/*.zip"
          allowUpdates: true
          replacesArtifacts: true